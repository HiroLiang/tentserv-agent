name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to package, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

jobs:
  package:
    name: Package ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            archive_ext: tar.gz
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive_ext: zip
    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi

          case "${tag}" in
            refs/*)
              echo "release tag must be a bare tag, not a ref: ${tag}" >&2
              exit 1
              ;;
          esac

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "malformed release tag: ${tag}" >&2
            exit 1
          fi

          echo "tag=${tag}" >>"${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release_tag.outputs.tag }}

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          bash scripts/release-metadata.sh --github-output "${{ steps.release_tag.outputs.tag }}"

      - name: Verify native target
        shell: bash
        env:
          TENTGENT_TARGET: ${{ matrix.target }}
        run: |
          os="$(uname -s)"
          arch="$(uname -m)"
          case "${TENTGENT_TARGET}:${os}:${arch}" in
            aarch64-apple-darwin:Darwin:arm64) ;;
            x86_64-apple-darwin:Darwin:x86_64) ;;
            x86_64-unknown-linux-gnu:Linux:x86_64) ;;
            x86_64-pc-windows-msvc:MINGW*:x86_64) ;;
            x86_64-pc-windows-msvc:MSYS*:x86_64) ;;
            x86_64-pc-windows-msvc:CYGWIN*:x86_64) ;;
            *) echo "unexpected runner ${os}:${arch} for ${TENTGENT_TARGET}" >&2; exit 1 ;;
          esac

      - name: Package release artifact
        shell: bash
        env:
          TENTGENT_TARGET: ${{ matrix.target }}
          TENTGENT_VERSION: ${{ steps.release.outputs.version }}
        run: |
          scripts/package-local.sh
          mv dist/checksums.txt "dist/checksums-${TENTGENT_TARGET}.txt"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: tentgent-${{ matrix.target }}
          if-no-files-found: error
          path: |
            dist/tentgent-${{ steps.release.outputs.version }}-${{ matrix.target }}.${{ matrix.archive_ext }}
            dist/checksums-${{ matrix.target }}.txt

  release:
    name: Create GitHub release
    needs: package
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi

          case "${tag}" in
            refs/*)
              echo "release tag must be a bare tag, not a ref: ${tag}" >&2
              exit 1
              ;;
          esac

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "malformed release tag: ${tag}" >&2
            exit 1
          fi

          echo "tag=${tag}" >>"${GITHUB_OUTPUT}"

      - name: Checkout installer
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release_tag.outputs.tag }}
          sparse-checkout: |
            scripts/release-metadata.sh
            scripts/install.sh
            scripts/install.ps1
          sparse-checkout-cone-mode: false

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          bash scripts/release-metadata.sh --github-output "${{ steps.release_tag.outputs.tag }}"

      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p dist-release
          find artifacts -type f -name "tentgent-*.tar.gz" -exec cp {} dist-release/ \;
          find artifacts -type f -name "tentgent-*.zip" -exec cp {} dist-release/ \;
          find artifacts -type f -name "checksums-*.txt" -print0 \
            | sort -z \
            | xargs -0 cat >dist-release/checksums.txt
          cp scripts/install.sh dist-release/install.sh
          cp scripts/install.ps1 dist-release/install.ps1
          python3 - <<'PY'
          import re
          from pathlib import Path

          install_path = Path("dist-release/install.sh")
          text = install_path.read_text()
          text = re.sub(r'VERSION="[^"]+"', 'VERSION="${{ steps.release.outputs.version }}"', text, count=1)
          text = text.replace(
              'DEFAULT_BASE_URL="https://agent.tentserv.com/releases"',
              'DEFAULT_BASE_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.tag }}"',
              1,
          )
          text = text.replace(
              'BASE_URL="${TENTGENT_INSTALL_BASE_URL:-${DEFAULT_BASE_URL}/${VERSION}}"',
              'BASE_URL="${TENTGENT_INSTALL_BASE_URL:-${DEFAULT_BASE_URL}}"',
              1,
          )
          install_path.write_text(text)

          install_ps1_path = Path("dist-release/install.ps1")
          text = install_ps1_path.read_text()
          text = re.sub(r'\[string\]\$Version = "[^"]+"', '[string]$Version = "${{ steps.release.outputs.version }}"', text, count=1)
          text = text.replace(
              '$DefaultBaseUrl = "https://agent.tentserv.com/releases"',
              '$DefaultBaseUrl = "https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.tag }}"',
              1,
          )
          text = text.replace(
              '$BaseUrl = if ($env:TENTGENT_INSTALL_BASE_URL) { $env:TENTGENT_INSTALL_BASE_URL } else { "$DefaultBaseUrl/$Version" }',
              '$BaseUrl = if ($env:TENTGENT_INSTALL_BASE_URL) { $env:TENTGENT_INSTALL_BASE_URL } else { $DefaultBaseUrl }',
              1,
          )
          install_ps1_path.write_text(text)
          PY
          ls -lah dist-release
          test -s dist-release/checksums.txt
          test -s dist-release/install.sh
          test -s dist-release/install.ps1

          version="${{ steps.release.outputs.version }}"
          expected_assets=(
            "tentgent-${version}-aarch64-apple-darwin.tar.gz"
            "tentgent-${version}-x86_64-apple-darwin.tar.gz"
            "tentgent-${version}-x86_64-unknown-linux-gnu.tar.gz"
            "tentgent-${version}-x86_64-pc-windows-msvc.zip"
          )

          for asset in "${expected_assets[@]}"; do
            test -s "dist-release/${asset}" || {
              echo "missing release asset: ${asset}" >&2
              exit 1
            }

            matches="$(awk -v name="${asset}" '
              {
                got = $2
                sub(/^\*/, "", got)
                if (got == name) {
                  count++
                }
              }
              END { print count + 0 }
            ' dist-release/checksums.txt)"
            if [[ "${matches}" != "1" ]]; then
              echo "expected one checksum entry for ${asset}, got ${matches}" >&2
              exit 1
            fi
          done

          actual_count="$(awk '
            {
              name = $2
              sub(/^\*/, "", name)
              if (name ~ /^tentgent-.*(\.tar\.gz|\.zip)$/) {
                count++
              }
            }
            END { print count + 0 }
          ' dist-release/checksums.txt)"
          if [[ "${actual_count}" != "${#expected_assets[@]}" ]]; then
            echo "expected ${#expected_assets[@]} package checksum entries, got ${actual_count}" >&2
            exit 1
          fi

      - name: Write release notes
        shell: bash
        run: |
          cat >release-notes.md <<NOTES
          Tentgent ${{ steps.release.outputs.tag }}

          Release generated by GitHub Actions.

          Assets:
          - macOS Apple Silicon: tentgent-${{ steps.release.outputs.version }}-aarch64-apple-darwin.tar.gz
          - macOS Intel: tentgent-${{ steps.release.outputs.version }}-x86_64-apple-darwin.tar.gz
          - Linux x86_64: tentgent-${{ steps.release.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz
          - Windows x86_64: tentgent-${{ steps.release.outputs.version }}-x86_64-pc-windows-msvc.zip
          - checksums.txt
          - install.sh
          - install.ps1

          Linux x86_64 note:
          This release includes the Linux x86_64 CLI/install archive. Full managed runtime and local model backend parity is not claimed yet.

          macOS installer smoke test:

          \`\`\`bash
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.tag }}/install.sh" \\
            | sh -s -- --skip-python-bootstrap --skip-doctor
          \`\`\`

          Windows installer smoke test:

          \`\`\`powershell
          irm "https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.tag }}/install.ps1" | iex
          \`\`\`

          Linux x86_64 installer smoke command:

          \`\`\`bash
          curl -fsSL "https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.tag }}/install.sh" \\
            | bash -s -- --skip-python-bootstrap --skip-doctor
          \`\`\`
          NOTES

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          source scripts/release-metadata.sh

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist-release/*.tar.gz dist-release/*.zip dist-release/checksums.txt dist-release/install.sh dist-release/install.ps1 --clobber
            release_flags=()
            while IFS= read -r flag; do
              release_flags+=("${flag}")
            done < <(release_edit_flags "${{ steps.release.outputs.is_prerelease }}")
            gh release edit "${TAG}" "${release_flags[@]}" --title "Tentgent ${TAG}" --notes-file release-notes.md
          else
            release_flags=()
            while IFS= read -r flag; do
              release_flags+=("${flag}")
            done < <(release_create_flags "${{ steps.release.outputs.is_prerelease }}")
            gh release create "${TAG}" \
              dist-release/*.tar.gz \
              dist-release/*.zip \
              dist-release/checksums.txt \
              dist-release/install.sh \
              dist-release/install.ps1 \
              "${release_flags[@]}" \
              --verify-tag \
              --title "Tentgent ${TAG}" \
              --notes-file release-notes.md
          fi

      - name: Verify release state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          EXPECTED_PRERELEASE: ${{ steps.release.outputs.is_prerelease }}
        run: |
          actual_prerelease="$(gh release view "${TAG}" --json isPrerelease --jq '.isPrerelease')"
          if [[ "${actual_prerelease}" != "${EXPECTED_PRERELEASE}" ]]; then
            echo "release ${TAG} prerelease state is ${actual_prerelease}, expected ${EXPECTED_PRERELEASE}" >&2
            exit 1
          fi

          actual_latest="$(gh release list --limit 100 --json tagName,isLatest,isPrerelease --jq ".[] | select(.tagName == \"${TAG}\") | .isLatest")"
          if [[ -z "${actual_latest}" ]]; then
            echo "release ${TAG} was not found in gh release list output" >&2
            exit 1
          fi

          if [[ "${EXPECTED_PRERELEASE}" == "true" && "${actual_latest}" == "true" ]]; then
            echo "release ${TAG} is a prerelease but is still marked latest" >&2
            echo "Manually clear the latest marker or publish a stable latest release before rerunning this workflow." >&2
            exit 1
          fi

          if [[ "${EXPECTED_PRERELEASE}" == "false" && "${actual_latest}" != "true" ]]; then
            echo "release ${TAG} is stable but is not marked latest" >&2
            exit 1
          fi
